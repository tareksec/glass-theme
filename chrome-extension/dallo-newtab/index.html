<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>New Tab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">
    <!-- Top navigation -->
    <nav class="topbar">
      <button class="icon-btn embossed" id="menuBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="8" r="3.2" />
          <path d="M5 20c1.2-4 4-6 7-6s5.8 2 7 6" />
        </svg>
      </button>

      <div class="nav-links">
        <a href="#" class="nav-link" data-panel="bookmarks">Bookmarks</a>
        <a href="#" class="nav-link" data-panel="recent">Recent Tabs</a>
        <a href="#" class="nav-link" data-panel="shortcuts">Shortcuts</a>
      </div>

      <div class="nav-right">
        <form class="search-form" id="searchForm">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="7" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search by"
            autocomplete="off"
            aria-label="Search Google"
          />
        </form>
        <button class="icon-btn embossed" id="profileBtn" aria-label="Profile">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="8" r="3.2" />
            <path d="M5 20c1.2-4 4-6 7-6s5.8 2 7 6" />
          </svg>
        </button>
      </div>
    </nav>

    <!-- Panel that opens for Bookmarks / Recent Tabs / Shortcuts -->
    <div class="dropdown-panel embossed" id="navPanel" hidden>
      <div class="panel-title" id="panelTitle">Bookmarks</div>
      <div class="panel-body" id="panelBody"></div>
    </div>

    <!-- Main content -->
    <main class="content">
      <!-- Left column -->
      <section class="left-col">
        <!-- Clock widget -->
        <div class="card embossed clock-card">
          <div class="clock-toggle-row">
            <span class="widget-label">Clock</span>
            <button class="toggle" id="darkToggle" aria-label="Toggle dark mode" aria-pressed="false">
              <span class="toggle-knob"></span>
            </button>
          </div>

          <div class="clock-face inset" id="clockFace">
            <div class="hand hour" id="hourHand"></div>
            <div class="hand minute" id="minuteHand"></div>
            <div class="hand second" id="secondHand"></div>
            <div class="clock-center"></div>
            <span class="tick t0"></span>
            <span class="tick t1"></span>
            <span class="tick t2"></span>
            <span class="tick t3"></span>
            <span class="tick t4"></span>
            <span class="tick t5"></span>
            <span class="tick t6"></span>
            <span class="tick t7"></span>
            <span class="tick t8"></span>
            <span class="tick t9"></span>
            <span class="tick t10"></span>
            <span class="tick t11"></span>
          </div>

          <div class="date-row">
            <span class="date-label">Demo</span>
            <span class="date-value" id="dateValue">--/--</span>
          </div>
        </div>

        <!-- List widget -->
        <div class="card embossed list-card">
          <ul class="item-list">
            <li class="item-row">
              <span class="dot dot-green"></span>
              <span class="item-name">Stones</span>
              <span class="item-meta">
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5z"/></svg> 2
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg> 4
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg> 7/9
              </span>
            </li>
            <li class="item-row">
              <span class="dot dot-pink"></span>
              <span class="item-name">Project 007</span>
              <span class="item-meta">
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5z"/></svg> 0
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg> 4
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg> 2/4
              </span>
            </li>
            <li class="item-row">
              <span class="dot dot-orange"></span>
              <span class="item-name">Team mates</span>
              <span class="item-meta">
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5z"/></svg> 0
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg> 0
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg> 5/8
              </span>
            </li>
          </ul>
        </div>

        <!-- Info widget -->
        <div class="card embossed info-card">
          <div class="info-thumb">
            <span class="chip c1"></span>
            <span class="chip c2"></span>
            <span class="chip c3"></span>
            <span class="chip c4"></span>
            <span class="chip c5"></span>
            <span class="chip c6"></span>
          </div>
          <div class="info-text">
            <p>Focus on tasks<br />that matter</p>
            <a href="#" class="learn-link">Learn more <span class="arrow">&#8599;</span></a>
          </div>
        </div>
      </section>

      <!-- Right column: hero -->
      <section class="card embossed hero-card">
        <div class="hero-copy">
          <h1 class="hero-title">D<span class="macron">&#257;</span>LLO</h1>
          <p class="hero-subtitle">Your Balanced Approach to<br />Project Management</p>
          <a href="#" class="join-link">Join Dallo <span class="arrow">&#8599;</span></a>
        </div>

        <div class="hero-art" aria-hidden="true">
          <svg viewBox="0 0 260 300" class="stones-illustration">
            <ellipse cx="130" cy="270" rx="88" ry="30" fill="#00000012" />
            <ellipse cx="128" cy="238" rx="82" ry="34" fill="#5f7a52" />
            <ellipse cx="128" cy="238" rx="82" ry="34" fill="url(#greenGrad)" />
            <ellipse cx="132" cy="178" rx="70" ry="30" fill="url(#pinkGrad)" />
            <ellipse cx="126" cy="120" rx="58" ry="26" fill="url(#orangeGrad)" />
            <ellipse cx="132" cy="72" rx="42" ry="22" fill="url(#creamGrad)" />
            <circle cx="118" cy="66" r="1.6" fill="#8a7f6a" />
            <circle cx="140" cy="70" r="1.3" fill="#8a7f6a" />
            <circle cx="128" cy="78" r="1.4" fill="#8a7f6a" />
            <defs>
              <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#8faf7c" />
                <stop offset="100%" stop-color="#516d43" />
              </linearGradient>
              <linearGradient id="pinkGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f3c9c4" />
                <stop offset="100%" stop-color="#e0a29c" />
              </linearGradient>
              <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f2a25c" />
                <stop offset="100%" stop-color="#d97b32" />
              </linearGradient>
              <linearGradient id="creamGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#faf6ec" />
                <stop offset="100%" stop-color="#e6ddc6" />
              </linearGradient>
            </defs>
          </svg>
        </div>

        <div class="hero-pagination embossed">
          <button class="page-arrow" id="prevPage" aria-label="Previous">&#8249;</button>
          <button class="page-arrow" id="nextPage" aria-label="Next">&#8250;</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
